<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kahoot Bot - WebUI</title>
  <meta name="description" content="Kahoot Bot Control Panel with automated 2FA bypass">
  <link rel="stylesheet" href="/style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>

<body>

  <div class="app">
    <!-- ═══ Header ═══ -->
    <header class="header">
      <div class="header-left">
        <span class="logo-icon">{/}</span>
        <span class="logo">KAHOOT BOT</span>
        <span class="version">v3.2 — by Leo</span>
      </div>
      <div class="header-stats">
        <div class="stat">
          <span class="stat-value" id="stat-joined">0</span>
          <span>Joined</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-failed">0</span>
          <span>Failed</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-total">0</span>
          <span>Total</span>
        </div>
      </div>
    </header>

    <!-- ═══ Sidebar ═══ -->
    <aside class="sidebar">
      <!-- Step 1: Connect -->
      <div class="card" id="cardStep1">
        <div class="card-title">1. Connect & Probe</div>
        <div class="field">
          <label for="gamePin">Game PIN</label>
          <input type="text" id="gamePin" placeholder="e.g. 1568989" maxlength="8" autocomplete="off">
        </div>
        <button class="btn btn-start" id="btnConnect" onclick="handleConnect()" style="width: 100%; margin-top: 10px;">
          Connect
        </button>
        <button class="btn btn-stop" id="btnDisconnect" onclick="handleDisconnectAll()"
          style="width: 100%; margin-top: 6px; display: none;">
          Disconnect
        </button>
      </div>

      <!-- Step 2: 2FA Swarm -->
      <div class="card tfa-card" id="cardStep2" style="opacity: 0.5; pointer-events: none;">
        <div class="card-title">2. Resolve 2FA</div>
        <div class="tfa-status idle" id="tfaStatus">
          <span>Waiting for Scout...</span>
        </div>
        <div class="tfa-progress" id="tfaProgressContainer" style="display:none;">
          <div class="tfa-progress-bar" id="tfaProgressBar" style="width:0%"></div>
        </div>
        <button class="btn btn-recrack" id="btnSwarm" onclick="handleSwarmToggle()"
          style="width: 100%; margin-top: 10px;" disabled>
          Start Bypass
        </button>
      </div>

      <!-- Step 3: Deploy -->
      <div class="card" id="cardStep3" style="opacity: 0.5; pointer-events: none;">
        <div class="card-title">3. Deploy Bots</div>
        <div class="field">
          <label for="botCount">Bot Count</label>
          <input type="number" id="botCount" value="50" min="1" max="500">
        </div>
        <div class="field">
          <label for="botPrefix">Bot Prefix</label>
          <input type="text" id="botPrefix" value="Bot" placeholder="e.g. Bot">
        </div>
        <div class="field">
          <label for="nameMode">Name Style</label>
          <select id="nameMode">
            <option value="prefix">Prefix (Bot_1, Bot_2...)</option>
            <option value="random" selected>Random Names</option>
          </select>
        </div>
        <div class="field">
          <label for="joinDelay">Join Delay (ms)</label>
          <input type="number" id="joinDelay" value="2000" min="50" max="10000">
        </div>
        <div class="field">
          <label for="answerMode">Answer Mode (Beta)</label>
          <select id="answerMode">
            <option value="random" selected>Random</option>
            <option value="correct">Correct (if possible)</option>
          </select>
        </div>
        <button class="btn btn-start" id="btnDeploy" onclick="handleDeploy()" style="width: 100%; margin-top: 10px;"
          disabled>
          Send Bots
        </button>
        <button class="btn btn-start" id="btnAddMore" onclick="handleAddMore()"
          style="width: 100%; margin-top: 6px; display: none; background: #7c3aed; border-color: #6d28d9;">
          Send again
        </button>
        <button class="btn btn-stop" id="btnStop" onclick="handleStop()" disabled
          style="width: 100%; margin-top: 6px; background: #e21b3c; border-color: #c61734; color: white;">
          Remove Bots
        </button>
      </div>
    </aside>

    <!-- ═══ Main Content ═══ -->
    <main class="main">
      <!-- Bot Grid -->
      <div class="bot-grid-container">
        <div class="bot-grid-header">
          <span class="bot-grid-title" id="botGridTitle">Bots</span>
        </div>
        <div class="bot-grid" id="botGrid">
          <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">[-]</div>
            <div class="empty-state-text">No bots active</div>
          </div>
        </div>
      </div>

      <!-- Log Panel -->
      <div class="log-panel">
        <div class="log-header">
          <span class="log-title">Log</span>
          <button class="log-clear" onclick="clearLog()">Clear</button>
        </div>
        <div class="log-entries" id="logEntries">
        </div>
      </div>
    </main>
  </div>

  <script>
    const socket = io();

    // ── DOM refs ──
    const $pin = document.getElementById('gamePin');
    const $count = document.getElementById('botCount');
    const $prefix = document.getElementById('botPrefix');
    const $nameMode = document.getElementById('nameMode');
    const $delay = document.getElementById('joinDelay');
    const $answer = document.getElementById('answerMode');

    const $btnConnect = document.getElementById('btnConnect');
    const $btnDisconnect = document.getElementById('btnDisconnect');
    const $btnSwarm = document.getElementById('btnSwarm');
    const $btnDeploy = document.getElementById('btnDeploy');
    const $btnAddMore = document.getElementById('btnAddMore');
    const $btnStop = document.getElementById('btnStop');

    const $cardStep2 = document.getElementById('cardStep2');
    const $cardStep3 = document.getElementById('cardStep3');

    const $botGrid = document.getElementById('botGrid');
    const $emptyState = document.getElementById('emptyState');
    const $logEntries = document.getElementById('logEntries');
    const $tfaStatus = document.getElementById('tfaStatus');
    const $tfaProgressContainer = document.getElementById('tfaProgressContainer');
    const $tfaProgressBar = document.getElementById('tfaProgressBar');
    const $gridTitle = document.getElementById('botGridTitle');

    // ── State ──
    let isRunning = false;
    let has2FA = false;
    let isSwarmActive = false;
    let scoutConnected = false;

    // ── Actions ──
    function handleConnect() {
      const config = {
        gamePin: $pin.value.trim()
      };

      if (!config.gamePin) {
        alert('Please enter a Game PIN!');
        return;
      }

      $btnConnect.disabled = true;
      $btnDisconnect.style.display = 'block';
      scoutConnected = true;

      // Clear old bot cells except keep grid clean
      const emptyEl = document.getElementById('emptyState');
      if (emptyEl) emptyEl.remove();

      // Reset 2FA
      setTfaStatus('idle', '⏸ Checking...');
      $cardStep2.style.opacity = '1';
      $cardStep2.style.pointerEvents = 'auto';

      socket.emit('connectScout', config);
      addLog('info', `Connecting Scout to PIN ${config.gamePin}...`);
    }

    function handleDisconnectAll() {
      socket.emit('disconnectAll');
      resetUI();
      addLog('warn', 'Disconnect all signal sent...');
    }

    function handleDeploy() {
      const config = {
        gamePin: $pin.value.trim(),
        botCount: parseInt($count.value) || 50,
        botPrefix: $prefix.value.trim() || 'Bot',
        joinDelay: parseInt($delay.value) || 2000,
        answerMode: $answer.value,
        nameMode: $nameMode.value
      };

      if (!config.gamePin) {
        alert('Please enter a Game PIN!');
        return;
      }

      isRunning = true;
      $btnDeploy.disabled = true;
      $btnStop.disabled = false;
      $btnAddMore.style.display = 'block';

      document.getElementById('stat-joined').textContent = '0';
      document.getElementById('stat-failed').textContent = '0';
      document.getElementById('stat-total').textContent = config.botCount;

      socket.emit('start', config);
      addLog('info', `Deploying ${config.botCount} bots to PIN ${config.gamePin}...`);
    }

    function handleAddMore() {
      const config = {
        botCount: parseInt($count.value) || 10,
        botPrefix: $prefix.value.trim() || 'Bot',
        nameMode: $nameMode.value
      };
      socket.emit('addMoreBots', config);
      addLog('info', `Adding ${config.botCount} more bots...`);
    }

    function handleStop() {
      socket.emit('stop');
      isRunning = false;
      $btnConnect.disabled = false;
      $btnDeploy.disabled = false;
      $btnStop.disabled = true;
      $btnAddMore.style.display = 'none';
      addLog('warn', 'Stop signal sent...');
    }

    function handleSwarmToggle() {
      socket.emit('toggleSwarm');
    }

    function resetUI() {
      isRunning = false;
      has2FA = false;
      isSwarmActive = false;
      scoutConnected = false;

      $btnConnect.disabled = false;
      $btnDisconnect.style.display = 'none';
      $btnDeploy.disabled = true;
      $btnStop.disabled = true;
      $btnAddMore.style.display = 'none';
      $btnSwarm.disabled = true;

      $cardStep2.style.opacity = '0.5';
      $cardStep2.style.pointerEvents = 'none';
      $cardStep3.style.opacity = '0.5';
      $cardStep3.style.pointerEvents = 'none';

      setTfaStatus('idle', '⏸ Waiting for Scout...');
      $tfaProgressContainer.style.display = 'none';
      $tfaProgressBar.style.width = '0%';

      // Clear bot grid
      $botGrid.innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-state-icon">[-]</div><div class="empty-state-text">No bots active</div></div>';
      $gridTitle.textContent = 'Bots';

      document.getElementById('stat-joined').textContent = '0';
      document.getElementById('stat-failed').textContent = '0';
      document.getElementById('stat-total').textContent = '0';
    }

    // ── Socket Events ──

    socket.on('log', (data) => {
      addLog(data.type, data.msg);
    });

    socket.on('stats', (data) => {
      document.getElementById('stat-joined').textContent = data.joined;
      document.getElementById('stat-failed').textContent = data.failed;
      document.getElementById('stat-total').textContent = data.total;
    });

    socket.on('botUpdate', (data) => {
      if (data.status === 'remove') {
        // Remove the bot cell from the grid
        const cell = document.getElementById(`bot-${data.index}`);
        if (cell) cell.remove();
        updateGridTitle();
        return;
      }
      updateBotCell(data.index, data.name, data.status);
    });

    socket.on('tfaStatus', (data) => {
      switch (data.phase) {
        case 'idle':
          setTfaStatus('idle', '⏸ Waiting for Scout...');
          $btnSwarm.disabled = true;
          $btnSwarm.textContent = 'Start Bypass';
          isSwarmActive = false;
          break;
        case 'probing':
          setTfaStatus('probing', '[i] Checking for 2FA...');
          break;
        case 'reconnecting':
          setTfaStatus('idle', '[i] Scout Reconnecting...');
          break;
        case 'probed':
          if (data.has2FA) {
            has2FA = true;
            setTfaStatus('cracking', '[!] 2FA detected — ready to crack');
            $btnSwarm.disabled = false;
            $btnSwarm.textContent = 'Start Bypass';
          } else {
            setTfaStatus('idle', '[+] No 2FA');
            $cardStep3.style.opacity = '1';
            $cardStep3.style.pointerEvents = 'auto';
            $btnDeploy.disabled = false;
          }
          break;
        case 'cracking':
          isSwarmActive = true;
          setTfaStatus('cracking', `[i] Cracking... (${data.progress || 0}/24 Bots)`);
          $tfaProgressContainer.style.display = 'block';
          $tfaProgressBar.style.width = `${((data.progress || 0) / 24) * 100}%`;
          $tfaProgressBar.style.backgroundColor = '';
          $btnSwarm.disabled = false;
          $btnSwarm.textContent = 'Stop Bypass';
          break;
        case 'cracked':
          isSwarmActive = false;
          setTfaStatus('cracked', `[+] Cracked: `);
          $tfaStatus.innerHTML += `<span class="tfa-sequence">[${data.sequence}]</span>`;
          $tfaProgressBar.style.width = '100%';
          $tfaProgressBar.style.backgroundColor = '#10b981';
          $cardStep3.style.opacity = '1';
          $cardStep3.style.pointerEvents = 'auto';
          $btnDeploy.disabled = false;
          $btnSwarm.disabled = false;
          $btnSwarm.textContent = 'Re-Crack';
          break;
        case 'error':
          isSwarmActive = false;
          setTfaStatus('error', '[!] 2FA Error');
          $tfaProgressContainer.style.display = 'none';
          $btnSwarm.disabled = false;
          $btnSwarm.textContent = 'Start Bypass';
          break;
      }
    });

    socket.on('state', (data) => {
      isRunning = data.running;
      if (isRunning) {
        $btnConnect.disabled = true;
        $btnDeploy.disabled = true;
        $btnStop.disabled = false;
        $btnAddMore.style.display = 'block';
      }
    });

    // ── UI Helpers ──

    function setTfaStatus(className, html) {
      $tfaStatus.className = 'tfa-status ' + className;
      $tfaStatus.innerHTML = (className === 'probing' || className === 'cracking')
        ? `<div class="tfa-spinner"></div><span>${html}</span>`
        : `<span>${html}</span>`;
    }

    function updateBotCell(index, name, status) {
      let cell = document.getElementById(`bot-${index}`);
      if (!cell) {
        // Remove empty state if present
        const emptyEl = document.getElementById('emptyState');
        if (emptyEl) emptyEl.remove();

        cell = document.createElement('div');
        cell.id = `bot-${index}`;
        cell.className = 'bot-cell';
        $botGrid.appendChild(cell);
      }

      const statusLabels = {
        waiting: 'Warten',
        joining: 'Joining',
        '2fa': '2FA...',
        ingame: 'Im Spiel',
        retry: 'Retry',
        error: 'Fehler',
        '2fa_failed': '2FA Fehler',
        disconnected: 'Offline'
      };

      cell.className = `bot-cell ${status.replace('2fa_failed', 'two_fa_failed')}`;
      cell.innerHTML = `
        <span class="bot-name" title="${name}">${name}</span>
        <span class="bot-badge">${statusLabels[status] || status}</span>
      `;

      updateGridTitle();
    }

    function updateGridTitle() {
      const count = $botGrid.querySelectorAll('.bot-cell').length;
      $gridTitle.textContent = count > 0 ? `Bots (${count})` : 'Bots';
    }

    function addLog(type, msg) {
      const now = new Date();
      const time = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.innerHTML = `<span class="log-time">${time}</span>${escapeHtml(msg)}`;
      $logEntries.appendChild(entry);

      // Auto-scroll
      $logEntries.scrollTop = $logEntries.scrollHeight;

      // Limit to 500 entries
      while ($logEntries.children.length > 500) {
        $logEntries.removeChild($logEntries.firstChild);
      }
    }

    function clearLog() {
      $logEntries.innerHTML = '';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ── Keyboard shortcut ──
    $pin.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !$btnConnect.disabled) handleConnect();
    });
  </script>

</body>

</html>
